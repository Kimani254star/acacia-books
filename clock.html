<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Digital Clock</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body id="body" class="flex flex-col items-center justify-center min-h-screen bg-gray-100 transition">

    <div class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-4xl">
        
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold dark:text-white">🌍 World Clock</h1>
            <div class="space-x-2">
                <button onclick="toggleFormat()" class="px-3 py-1 bg-blue-500 text-white rounded">12/24h</button>
                <button onclick="toggleTheme()" class="px-3 py-1 bg-gray-700 text-white rounded">🌙</button>
            </div>
        </div>

        <p id="date" class="text-center mb-4 text-gray-600 dark:text-gray-300"></p>

        <div id="clockContainer" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>

        <div class="mt-6 flex gap-2">
            <input id="timezoneInput" placeholder="e.g. Europe/Paris" 
                   class="flex-1 p-2 border rounded">
            <button onclick="addTimezone()" 
                    class="bg-green-500 text-white px-4 rounded">Add</button>
        </div>
    </div>

<script>
    let is24Hour = false;

    const timezones = [
        { name: "Local", zone: Intl.DateTimeFormat().resolvedOptions().timeZone },
        { name: "UTC", zone: "UTC" },
        { name: "New York", zone: "America/New_York" },
        { name: "London", zone: "Europe/London" },
        { name: "Tokyo", zone: "Asia/Tokyo" },
        { name: "Sydney", zone: "Australia/Sydney" }
    ];

    function formatTime(date, zone) {
        return new Intl.DateTimeFormat('en-US', {
            timeZone: zone,
            hour: 'numeric',
            minute: 'numeric',
            second: 'numeric',
            hour12: !is24Hour
        }).format(date);
    }

    function renderClocks() {
        const container = document.getElementById("clockContainer");
        container.innerHTML = "";

        timezones.forEach(tz => {
            const div = document.createElement("div");
            div.className = "bg-blue-100 dark:bg-gray-700 p-4 rounded text-center hover:scale-105 transform transition";

            div.innerHTML = `
                <h2 class="font-semibold dark:text-white">${tz.name}</h2>
                <div id="${tz.zone}" class="text-xl font-mono dark:text-gray-200"></div>
            `;

            container.appendChild(div);
        });
    }

    function updateClocks() {
        const now = new Date();

        document.getElementById("date").innerText = now.toDateString();

        timezones.forEach(tz => {
            const el = document.getElementById(tz.zone);
            if (el) el.innerText = formatTime(now, tz.zone);
        });
    }

    function toggleFormat() {
        is24Hour = !is24Hour;
    }

    function toggleTheme() {
        document.body.classList.toggle("bg-gray-900");
        document.body.classList.toggle("bg-gray-100");
        document.body.classList.toggle("text-white");
    }

    function addTimezone() {
        const input = document.getElementById("timezoneInput");
        const value = input.value.trim();

        if (!value) return;

        timezones.push({ name: value.split('/').pop(), zone: value });
        input.value = "";
        renderClocks();
    }

    renderClocks();
    setInterval(updateClocks, 1000);
    updateClocks();
</script>

</body>
</html><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f7fafc;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg">
        <h1 class="text-2xl font-bold mb-4">Digital Clock</h1>
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-blue-100 p-4 rounded text-center">
                <h2 class="font-semibold">UTC</h2>
                <div id="utc" class="text-xl font-mono"></div>
            </div>
            <div class="bg-red-100 p-4 rounded text-center">
                <h2 class="font-semibold">EST</h2>
                <div id="est" class="text-xl font-mono"></div>
            </div>
            <div class="bg-green-100 p-4 rounded text-center">
                <h2 class="font-semibold">GMT</h2>
                <div id="gmt" class="text-xl font-mono"></div>
            </div>
            <div class="bg-purple-100 p-4 rounded text-center">
                <h2 class="font-semibold">IST</h2>
                <div id="ist" class="text-xl font-mono"></div>
            </div>
            <div class="bg-orange-100 p-4 rounded text-center">
                <h2 class="font-semibold">PST</h2>
                <div id="pst" class="text-xl font-mono"></div>
            </div>
            <div class="bg-pink-100 p-4 rounded text-center">
                <h2 class="font-semibold">JST</h2>
                <div id="jst" class="text-xl font-mono"></div>
            </div>
            <div class="bg-teal-100 p-4 rounded text-center">
                <h2 class="font-semibold">AEST</h2>
                <div id="aest" class="text-xl font-mono"></div>
            </div>
        </div>
    </div>
    <script>
        function updateClocks() {
            const now = new Date();
            document.getElementById('utc').innerText = now.toUTCString().slice(17, 26);
            document.getElementById('est').innerText = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' })).toLocaleTimeString();
            document.getElementById('gmt').innerText = new Date(now.toLocaleString('en-GB', { timeZone: 'GMT' })).toLocaleTimeString();
            document.getElementById('ist').innerText = new Date(now.toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' })).toLocaleTimeString();
            document.getElementById('pst').innerText = new Date(now.toLocaleString('en-US', { timeZone: 'America/Los_Angeles' })).toLocaleTimeString();
            document.getElementById('jst').innerText = new Date(now.toLocaleString('en-JP', { timeZone: 'Asia/Tokyo' })).toLocaleTimeString();
            document.getElementById('aest').innerText = new Date(now.toLocaleString('en-AU', { timeZone: 'Australia/Sydney' })).toLocaleTimeString();
        }

        setInterval(updateClocks, 1000);
        updateClocks(); // Initial call to display immediately
    </script>
</body>
</html>
